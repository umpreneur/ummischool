<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname;
    window.location.replace("/?redirect=" + encodeURIComponent(path));
  </script>
</head>
